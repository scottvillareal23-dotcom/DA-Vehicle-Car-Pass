<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- DA Logo - Department of Agriculture Region V -->
  <circle cx="50" cy="50" r="48" fill="#166534" stroke="#15803d" stroke-width="2"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Rice/Wheat stalks -->
  <g fill="#fbbf24">
    <!-- Left stalk -->
    <ellipse cx="35" cy="35" rx="3" ry="6" transform="rotate(-30 35 35)"/>
    <ellipse cx="32" cy="40" rx="3" ry="6" transform="rotate(-45 32 40)"/>
    <ellipse cx="30" cy="46" rx="3" ry="6" transform="rotate(-60 30 46)"/>
    
    <!-- Right stalk -->
    <ellipse cx="65" cy="35" rx="3" ry="6" transform="rotate(30 65 35)"/>
    <ellipse cx="68" cy="40" rx="3" ry="6" transform="rotate(45 68 40)"/>
    <ellipse cx="70" cy="46" rx="3" ry="6" transform="rotate(60 70 46)"/>
  </g>
  
  <!-- Center shield/emblem -->
  <path d="M50 28 L62 38 L62 55 Q62 65 50 72 Q38 65 38 55 L38 38 Z" fill="#fbbf24"/>
  <path d="M50 32 L58 40 L58 54 Q58 62 50 68 Q42 62 42 54 L42 40 Z" fill="#166534"/>
  
  <!-- DA text -->
  <text x="50" y="56" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="14" font-weight="bold">DA</text>
  
  <!-- Region V text at bottom -->
  <text x="50" y="88" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">REGION V</text>
</svg>
